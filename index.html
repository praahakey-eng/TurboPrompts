<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TurboPrompts | High-Speed AI Art</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <nav>
        <div class="logo">Turbo<span>Prompts</span></div>
    </nav>

    <header>
        <h1>Ignite Your Creativity 🚀</h1>
        <p>Copy high-speed, realistic AI prompts in one tap.</p>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search prompts (e.g. hair, car, resin)..." onkeyup="searchPrompts()">
        </div>
    </header>

    <main class="grid-container" id="promptGrid">
        </main>

    <div id="toast" class="toast">Copied to Clipboard! 🔥</div>

    <script src="script.js"></script>
</body>
</html>
